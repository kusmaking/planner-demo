<script>
const STORAGE_KEYS = {
  employees: 'planner_html_employees_v1',
  entries: 'planner_html_entries_v1',
  startDate: 'planner_html_start_v1'
};

const state = {
  employees: [],
  entries: [],
  startDate: new Date(load(STORAGE_KEYS.startDate, '2026-01-05T00:00:00')),
  search: ''
};

function load(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch {
    return fallback;
  }
}

function saveAll() {
  localStorage.setItem(STORAGE_KEYS.employees, JSON.stringify(state.employees));
  localStorage.setItem(STORAGE_KEYS.entries, JSON.stringify(state.entries));
  localStorage.setItem(STORAGE_KEYS.startDate, JSON.stringify(state.startDate.toISOString()));
}

function addDays(date, days) {
  const d = new Date(date);
  d.setDate(d.getDate() + days);
  return d;
}

function isoDate(date) {
  return new Date(date.getTime() - date.getTimezoneOffset() * 60000).toISOString().slice(0, 10);
}

function formatDay(date) {
  return date.toLocaleDateString('nb-NO', { day: '2-digit', month: '2-digit' });
}

function getVisibleDays() {
  return Array.from({ length: 42 }, (_, i) => addDays(state.startDate, i));
}

function filteredEmployees() {
  return state.employees.filter(e =>
    e.name.toLowerCase().includes(state.search.toLowerCase())
  );
}

function renderCalendar() {
  const container = document.getElementById('calendarWrap');
  const days = getVisibleDays();
  const employees = filteredEmployees();
  const dayWidth = 42;

  const header = days.map(d => `
    <div class="border-b p-1 text-center text-[10px] bg-slate-50 text-slate-600">
      ${formatDay(d)}
    </div>
  `).join('');

  const rows = employees.map(emp => {
    const cells = days.map(d => `
      <div class="border-r border-b min-h-[56px] bg-white"></div>
    `).join('');

    const blocks = state.entries
      .filter(entry => entry.employee === emp.name)
      .map(entry => {
        const startIdx = Math.max(0, Math.floor((new Date(entry.start) - days[0]) / 86400000));
        const endIdx = Math.min(days.length - 1, Math.floor((new Date(entry.end) - days[0]) / 86400000));
        if (endIdx < 0 || startIdx > days.length - 1) return '';

        const span = Math.max(1, endIdx - startIdx + 1);
        const left = startIdx * dayWidth + 2;
        const width = Math.max(36, span * dayWidth - 4);

        return `
          <div
            class="absolute top-1 h-[48px] rounded-xl border bg-blue-500 text-white px-2 py-1 text-[10px] leading-tight overflow-hidden"
            style="left:${left}px;width:${width}px;"
            title="${entry.project}&#10;Ansatt: ${entry.employee}&#10;Periode: ${entry.start} til ${entry.end}"
          >
            <div class="font-semibold truncate">${entry.project}</div>
          </div>
        `;
      }).join('');

    return `
      <div class="sticky left-0 z-20 bg-white border-r border-b border-slate-200 p-3 text-sm font-medium min-h-[56px] flex items-center">
        ${emp.name}
      </div>
      <div class="relative border-b border-slate-200" style="grid-column: span ${days.length} / span ${days.length}; min-height: 56px;">
        <div class="grid" style="grid-template-columns: repeat(${days.length}, minmax(${dayWidth}px, 1fr));">
          ${cells}
        </div>
        ${blocks}
      </div>
    `;
  }).join('');

  container.innerHTML = `
    <div class="min-w-[2200px]">
      <div class="grid" style="grid-template-columns: 260px repeat(${days.length}, minmax(${dayWidth}px, 1fr));">
        <div class="sticky left-0 z-30 bg-white border-r border-b border-slate-200 p-3 font-semibold">Ansatt</div>
        ${header}
        ${rows}
      </div>
    </div>
  `;
}

function bindEvents() {
  document.getElementById('searchInput').addEventListener('input', e => {
    state.search = e.target.value;
    renderCalendar();
  });

  document.getElementById('prevBtn').addEventListener('click', () => {
    state.startDate = addDays(state.startDate, -7);
    saveAll();
    renderCalendar();
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    state.startDate = addDays(state.startDate, 7);
    saveAll();
    renderCalendar();
  });
}

state.employees = load(STORAGE_KEYS.employees, [

state.entries = load(STORAGE_KEYS.entries, [

<script>
// DATA + STATE
const STORAGE_KEYS = {
  employees: 'planner_html_employees_v1',
  projects: 'planner_html_projects_v1',
  entries: 'planner_html_entries_v1',
  auditLog: 'planner_html_audit_v1',
  notificationLog: 'planner_html_notifications_v1'
};

const state = {
  employees: [],
  projects: [],
  entries: [],
  auditLog: [],
  notificationLog: []
};

function load(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch {
    return fallback;
  }
}

function saveAll() {
  localStorage.setItem(STORAGE_KEYS.employees, JSON.stringify(state.employees));
  localStorage.setItem(STORAGE_KEYS.projects, JSON.stringify(state.projects));
  localStorage.setItem(STORAGE_KEYS.entries, JSON.stringify(state.entries));
}

function formatDate(date) {
  const d = new Date(date);
  return d.toLocaleDateString('nb-NO');
}

function addDays(date, days) {
  const d = new Date(date);
  d.setDate(d.getDate() + days);
  return d;
}

function renderCalendar() {
  const container = document.getElementById('calendarWrap');
  if (!container) return;

  const days = Array.from({ length: 30 }, (_, i) => addDays(new Date(2026,0,1), i));

  container.innerHTML = `
    <div class="grid" style="grid-template-columns: 200px repeat(${days.length}, 1fr)">
      <div></div>
      ${days.map(d => `<div class="text-xs text-center">${formatDate(d)}</div>`).join('')}
      ${state.employees.map(emp => `
        <div class="font-medium">${emp.name}</div>
        ${days.map(() => `<div class="border h-10"></div>`).join('')}
      `).join('')}
    </div>
  `;
}
